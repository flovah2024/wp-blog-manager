name: WordPress Blog Publisher

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'
      - 'scripts/publish.py'
      - 'config.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run WordPress Publisher
        env:
          WP_ACCESS_TOKEN: ${{ secrets.WP_ACCESS_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          python scripts/publish.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit changes
        run: |
          git add articles/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update article status after publishing [skip ci]"
          fi

      - name: Push changes
        run: |
          git push origin main
        continue-on-error: true

      - name: Post publishing summary
        if: always()
        run: |
          echo "## WordPress Publishing Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
